name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check .

  type-check:
    name: type-check (ty + mypy fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      # ty (Astral, beta as of 2026-05) is informational; mypy is the gate.
      # Architecture caveat: "if ty fails on a Hermes / TinyFish / LLM-SDK
      # type stub before v1.0, fall back to mypy without ceremony."
      - name: ty (informational)
        continue-on-error: true
        run: uv run ty check src tests
      - name: mypy (gate)
        run: uv run mypy src tests

  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: pytest --cov
        run: uv run pytest --cov=salvager --cov-report=term-missing --cov-report=json
      - name: Upload coverage.json artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-json
          path: coverage.json
          retention-days: 7

  phase2-coverage:
    name: phase2-coverage (NFR-M2)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Download coverage.json artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-json
      - name: Phase 2 critical-path coverage gate (per-module >= 90%)
        run: uv run python scripts/phase2_coverage_gate.py

  adapter-discipline:
    name: adapter-discipline (NFR-M1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: AST-based adapter discipline lint
        run: uv run python scripts/adapter_discipline_lint.py

  payment-rail:
    name: payment-rail (FR25 / NFR-S5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Payment-rail enforcement lint
        run: uv run python scripts/payment_rail_lint.py

  dep-footprint:
    name: dep-footprint (NFR-M5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Assert direct dep count <= 30
        run: |
          count=$(uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(len(d['project'].get('dependencies', [])) + len(d.get('dependency-groups', {}).get('dev', [])))")
          echo "Direct deps (runtime + dev): $count"
          if [ "$count" -gt 30 ]; then
            echo "::error::Direct dep count $count exceeds NFR-M5 budget of 30"
            exit 1
          fi
