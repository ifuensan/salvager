version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current — Dependabot rewrites the
  # pin + the trailing version comment when a new release lands.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
